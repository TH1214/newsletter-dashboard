      name: DealBook
      url: /dealbook/
      weight: 30
    - identifier: economist
      name: Economist
      url: /economist/
      weight: 40
    - identifier: business-insider
      name: BI
      url: /business-insider/
      weight: 50
    - identifier: skift
      name: Skift
      url: /skift/
      weight: 60
    - identifier: buysiders
      name: Buysiders
      url: /buysiders/
      weight: 70
    - identifier: short-squeez
      name: Short Squeez
