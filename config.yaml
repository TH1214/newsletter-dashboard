baseURL: "https://th1214.github.io/newsletter-dashboard/"
languageCode: "ja"
title: "Bolgheri Daily Brief"
theme: "PaperMod"
timezone: "Asia/Tokyo"

params:
  defaultTheme: auto
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowFullTextinRSS: true
  homeInfoParams:
    Title: "Bolgheri Daily Brief"
    Content: "英語ニュースレターの日本語翻訳ダッシュボード＆アーカイブ"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 3
    keys: ["title", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: nyt-bn
      name: NYT BN
      url: /nyt-bn/
      weight: 10
