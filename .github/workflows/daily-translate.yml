name: Daily Newsletter Translation

on:
  schedule:
    # 6:00 JST = 21:00 UTC (前日)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to translate (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch and translate newsletters
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_SKIP_TERMS_ACCEPTANCE: '1'
        run: |
          TODAY=$(date +%Y-%m-%d)
          ALL_SOURCES="wsj nyt-bn short-squeez skift buysiders nyt-op business-insider"

          INPUT="${{ github.event.inputs.sources }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            SOURCES="$ALL_SOURCES"
          else
            SOURCES=$(echo "$INPUT" | tr ',' ' ')
          fi

          TRANSLATED=0
          FAILED=0
          SKIPPED=0

          for SOURCE in $SOURCES; do
            echo "::group::📧 Processing $SOURCE"

            # ── メール取得 ──
            if ! python scripts/fetch_gmail.py "$SOURCE" > "/tmp/email_${SOURCE}.txt" 2>/tmp/fetch_log.txt; then
              echo "❌ Fetch failed for $SOURCE"
              cat /tmp/fetch_log.txt
              FAILED=$((FAILED + 1))
              echo "::endgroup::"
              continue
            fi
            cat /tmp/fetch_log.txt

            if grep -q "NO_EMAIL_FOUND" "/tmp/email_${SOURCE}.txt"; then
              echo "⏭️ No email found for $SOURCE, skipping"
              SKIPPED=$((SKIPPED + 1))
              echo "::endgroup::"
              continue
            fi

            # ── 翻訳プロンプト構築 ──
            mkdir -p "content/${SOURCE}"

            cat scripts/translate_prompt.md > /tmp/full_prompt.txt
            printf "\n\n---\nSOURCE_SLUG: %s\nDATE: %s\n---\n\n" "$SOURCE" "$TODAY" >> /tmp/full_prompt.txt
            cat "/tmp/email_${SOURCE}.txt" >> /tmp/full_prompt.txt

            # ── Claude で翻訳 ──
            echo "🤖 Translating $SOURCE with Claude..."
            if cat /tmp/full_prompt.txt | claude -p \
              --output-format text \
              --max-turns 1 \
              > "/tmp/translated_${SOURCE}.md" 2>/tmp/claude_log.txt; then

              # コードフェンスが付いていたら除去
              sed -i '1{/^```/d}' "/tmp/translated_${SOURCE}.md"
              sed -i '${/^```$/d}' "/tmp/translated_${SOURCE}.md"

              # front matter の存在チェック
              if head -1 "/tmp/translated_${SOURCE}.md" | grep -q "^---"; then
                cp "/tmp/translated_${SOURCE}.md" "content/${SOURCE}/${TODAY}.md"
                echo "✅ Translated $SOURCE → content/${SOURCE}/${TODAY}.md"
                TRANSLATED=$((TRANSLATED + 1))
              else
                echo "⚠️ Output missing front matter for $SOURCE, skipping"
                cat "/tmp/translated_${SOURCE}.md" | head -5
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ Claude translation failed for $SOURCE"
              cat /tmp/claude_log.txt
              FAILED=$((FAILED + 1))
            fi

            echo "::endgroup::"
          done

          echo ""
          echo "📊 Summary: ✅ $TRANSLATED translated, ⏭️ $SKIPPED skipped, ❌ $FAILED failed"
          echo "translated=$TRANSLATED" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "No new translations to commit"
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "Daily newsletter translation $(date +%Y-%m-%d) [${CHANGED} file(s)]"
            git push
            echo "✅ Pushed ${CHANGED} translation(s)"
          fi
