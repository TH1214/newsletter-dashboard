name: Daily Newsletter Translation

on:
  schedule:
    # 6:00 JST = 21:00 UTC (前日)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to translate (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string
      date_override:
        description: 'Date override (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''
        type: string
      force_overwrite:
        description: 'Overwrite existing files (default: skip if exists)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 二重実行防止: 同日付の同workflowが走っている場合、新しい実行のみキュー化
# 異なるdate_overrideは別group扱いとし、scheduledとworkflow_dispatchも分離
concurrency:
  group: daily-translate-${{ github.event.inputs.date_override || 'today' }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and translate newsletters
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRANSLATION_MODEL: openai/gpt-4.1
          GITHUB_MODELS_ENDPOINT: https://models.github.ai/inference
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          INPUT_DATE="${{ github.event.inputs.date_override }}"
          if [ -n "$INPUT_DATE" ]; then
            TODAY="$INPUT_DATE"
          else
            TODAY=$(date +%Y-%m-%d)
          fi
          echo "📅 Processing date: $TODAY"
          ALL_SOURCES="wsj nyt-bn short-squeez skift buysiders nyt-op business-insider economist"

          INPUT="${{ github.event.inputs.sources }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            SOURCES="$ALL_SOURCES"
          else
            SOURCES=$(echo "$INPUT" | tr ',' ' ')
          fi

          TRANSLATED=0
          FAILED=0
          SKIPPED=0

          FORCE_OVERWRITE="${{ github.event.inputs.force_overwrite || 'false' }}"
          for SOURCE in $SOURCES; do
            echo "::group::📧 Processing $SOURCE"

            # ── 冪等性チェック: 既存ファイルがあれば skip (force_overwrite=trueなら上書き) ──
            EXISTING_FILE="content/${SOURCE}/${TODAY}.md"
            if [ -f "$EXISTING_FILE" ] && [ "$FORCE_OVERWRITE" != "true" ]; then
              echo "⏭️  $EXISTING_FILE already exists, skipping (set force_overwrite=true to override)"
              SKIPPED=$((SKIPPED + 1))
              echo "::endgroup::"
              continue
            fi

            # ── メール取得 ──
            FETCH_ARGS="$SOURCE"
            [ -n "$INPUT_DATE" ] && FETCH_ARGS="$SOURCE $TODAY"
            if ! python scripts/fetch_gmail.py $FETCH_ARGS > "/tmp/email_${SOURCE}.txt" 2>/tmp/fetch_log.txt; then
              echo "❌ Fetch failed for $SOURCE"
              cat /tmp/fetch_log.txt
              FAILED=$((FAILED + 1))
              echo "::endgroup::"
              continue
            fi
            cat /tmp/fetch_log.txt

            if grep -q "NO_EMAIL_FOUND" "/tmp/email_${SOURCE}.txt"; then
              echo "⏭️ No email found for $SOURCE, skipping"
              SKIPPED=$((SKIPPED + 1))
              echo "::endgroup::"
              continue
            fi

            # ── Gemini で翻訳 ──
            mkdir -p "content/${SOURCE}"
            echo "🤖 Translating $SOURCE with Gemini..."

            set +e
            python scripts/translate_gemini.py "$SOURCE" "$TODAY" \
              < "/tmp/email_${SOURCE}.txt" \
              > "/tmp/translated_${SOURCE}.md" \
              2>/tmp/claude_err.txt
            CLAUDE_EXIT=$?
            set -e

            echo "  translate_gemini.py exit code: $CLAUDE_EXIT"
            if [ -s /tmp/claude_err.txt ]; then
              echo "  stderr:"
              cat /tmp/claude_err.txt
            fi

            if [ $CLAUDE_EXIT -eq 0 ] && [ -s "/tmp/translated_${SOURCE}.md" ]; then
              if head -1 "/tmp/translated_${SOURCE}.md" | grep -q "^---"; then
                cp "/tmp/translated_${SOURCE}.md" "content/${SOURCE}/${TODAY}.md"
                echo "✅ Translated $SOURCE → content/${SOURCE}/${TODAY}.md"
                TRANSLATED=$((TRANSLATED + 1))

                # ── Hero 画像生成 (Pollinations.ai / non-blocking) ──
                echo "🎨 Generating hero image for $SOURCE..."
                set +e
                python scripts/generate_hero_image.py "$SOURCE" "$TODAY"
                IMG_EXIT=$?
                set -e
                if [ $IMG_EXIT -eq 0 ]; then
                  echo "🎨 ✅ Hero image generated for $SOURCE"
                else
                  echo "🎨 ⚠️ Hero image generation failed for $SOURCE (exit=$IMG_EXIT, non-blocking)"
                fi
              else
                echo "⚠️ Output missing front matter for $SOURCE"
                head -5 "/tmp/translated_${SOURCE}.md"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ Translation failed (exit=$CLAUDE_EXIT)"
              [ -s "/tmp/translated_${SOURCE}.md" ] && head -10 "/tmp/translated_${SOURCE}.md"
              FAILED=$((FAILED + 1))
            fi

            echo "::endgroup::"
          done

          echo ""
          echo "📊 Summary: ✅ $TRANSLATED translated, ⏭️ $SKIPPED skipped, ❌ $FAILED failed"
          echo "translated=$TRANSLATED" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ static/images/ 2>/dev/null || git add content/
          if git diff --cached --quiet; then
            echo "No new translations or images to commit"
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "Daily newsletter translation $(date +%Y-%m-%d) [${CHANGED} file(s)]"
            git push
            echo "✅ Pushed ${CHANGED} file(s)"
          fi
