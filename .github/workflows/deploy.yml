name: Deploy Bolgheri v2 (Next.js) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'v2-next/**'
      - 'content/**'
      - 'static/images/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'v2-next/package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Wire content + images into v2-next/
        run: |
          cd v2-next
          rm -rf content public/images
          ln -s ../content content
          mkdir -p public
          ln -s ../../static/images public/images
          ls -la content public/images | head -5

      - name: Install dependencies
        run: |
          cd v2-next
          npm ci --no-audit --prefer-offline

      - name: Build Next.js
        run: |
          cd v2-next
          npm run build
          echo "Built pages: $(find out -name 'index.html' | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./v2-next/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
